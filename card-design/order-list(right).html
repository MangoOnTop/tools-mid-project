<!doctype html>
<html lang="en">
  <html>
    <head>
      <meta charset="UTF-8" />
      <title>Cart - Bhai Bhai traders - Online Shop</title>
      <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-green-100">


<div class="bg-white border-2 border-green-100 rounded-xl p-6 shadow-sm flex flex-col gap-4 sticky top-6">
          <h3 class="text-lg font-bold text-green-900">Order Summary</h3>

          <div class="flex flex-col gap-2 text-sm text-gray-600">
            <div class="flex justify-between">
              <span>Subtotal</span>
              <span class="font-semibold text-gray-800">$20.00</span>
            </div>
            <div class="flex justify-between">
              <span>Shipping</span>
              <span class="font-semibold text-gray-800">$5.00</span>
            </div>
            <div class="flex justify-between">
              <span>Discount</span>
              <span class="font-semibold text-red-500">− $2.00</span>
            </div>
          </div>

          <div class="border-t border-gray-100 pt-4 flex justify-between text-base font-bold text-green-900">
            <span>Total</span>
            <span>$23.00</span>
          </div>

          <!-- Coupon -->
          <div class="flex gap-2 w-full">
            <input type="text" placeholder="Coupon code" class="min-w-0 flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-900"/>
            <button class="shrink-0 bg-green-900 text-white text-sm px-4 py-2 rounded-lg hover:bg-green-800 transition">Apply</button>
          </div>

          <!-- Checkout Button -->
          <button class="w-full bg-green-900 text-white font-bold py-3 rounded-xl hover:bg-green-800 transition text-sm mt-2">
            Proceed to Checkout →
          </button>

          <!-- Continue Shopping -->
          <a href="market.html" class="text-center text-sm text-green-900 font-semibold hover:underline">
            ← Continue Shopping
          </a>
        </div>

        </body>
