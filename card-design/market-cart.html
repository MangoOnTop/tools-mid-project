<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Card</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3">
<!--------------------------Copy market structure from here------------------------->
<!-- Single Product Card -->
<div class="w-56 cursor-pointer group border-2 border-green-900 rounded-md">

  <!-- Image Box -->
  <div class="bg-gray-100 w-full h-72 overflow-hidden rounded-md">
    <!----------------------dynamic image from fakeapi--------------------------->
    <img 
      src="your-image.jpg" 
      alt="Product" 
      class="w-full h-full object-cover group-hover:scale-105 transition duration-300"
    />
  </div>

  <!-----------------------dynamic Product Info ------------------------------->
  <div class="flex flex-col p-3 gap-2">
    
    <!-- Name and Variant/Catagory-->
    <div>
      <p class="text-sm font-bold text-gray-800">Basic Tee</p>
      <p class="text-xs text-gray-500">Catagory</p>
    </div>

    <!-- Price -->
    <div class="flex items-center gap-2">
      <p class="text-lg font-black text-green-900">$20</p>
    </div>

    <!-- Add to Cart Button -->
    <button class="w-full bg-green-900 text-white text-sm font-semibold py-2 rounded-md hover:bg-green-800 transition">
      Add to Cart
    </button>

  </div>

</div>
<!----------------------------------------end of copy-------------------------------->

</body>
</html>
