<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Card</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3">
   <!--------------------------Copy todays-offer structure from here------------------------->
<!-- Single Product Card -->
<div class="w-56 cursor-pointer group border-2 border-green-500 rounded-md">

  <!-- Image Box -->
  <div class="bg-gray-100 w-full h-72 overflow-hidden rounded-md relative">
    <!-- Dynamically change discount with js -->
    <span class="absolute top-1 right-1 bg-red-500 text-white text-xs px-2 py-1 rounded-md z-10">
      10% off
    </span>
    <!----------------------dynamic image from fakeapi--------------------------->
    <img
      src="your-image.jpg"
      alt="Product"
      class="w-full h-full object-cover group-hover:scale-105 transition duration-300"
    />
  </div>

  <!-----------------------dynamic Product Info ------------------------------->
  <div class="flex flex-col p-3 gap-2">

    <!-- Name and Variant -->
    <div>
      <p class="text-sm font-bold text-gray-800">Basic Tee</p>
      <p class="text-xs text-gray-500">Black</p>
    </div>

    <!-- Price -->
    <div class="flex items-center gap-2">
      <p class="text-lg font-black text-green-900">$20</p>
      <p class="text-xs font-medium text-gray-400 line-through">$35</p>
    </div>

    <!-- Add to Cart Button -->
    <button class="w-full bg-green-900 text-white text-sm font-semibold py-2 rounded-md hover:bg-green-200 text-color-black transition">
      Add to Cart
    </button>

  </div>
</div>
<!----------------------------------------end of todays-offer copy-------------------------------->
</body>
</html>

</body>
</html>
